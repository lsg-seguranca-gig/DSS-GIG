<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Mínimo</title>
</head>
<body style="font-family: sans-serif; padding: 40px; text-align: center;">
  <h1>Teste de JavaScript</h1>
  <p id="status">Se o JS estiver funcionando, o texto abaixo vai mudar e o botão vai responder.</p>
  <p id="resultado" style="font-size: 24px; font-weight: bold; color: red;">JS NÃO RODOU AINDA</p>
  <button id="btnTeste" style="font-size: 20px; padding: 10px 20px;">Clique aqui</button>

  <script>
    document.getElementById('resultado').textContent = 'JS RODOU NO CARREGAMENTO ✅';
    document.getElementById('resultado').style.color = 'green';

    document.getElementById('btnTeste').addEventListener('click', function(){
      alert('O clique funcionou! JS está OK nesta página.');
    });
  </script>
</body>
</html>
